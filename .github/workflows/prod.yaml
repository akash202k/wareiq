name: Terraform Prod Deployment
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      batch:
        description: "Production batch to deploy"
        required: true
        default: all
        type: choice
        options:
          - all
          - batch-1
          - batch-2
      disable_refresh:
        description: "Set terraform -refresh=false for plan/apply"
        required: true
        default: false
        type: boolean

env:
  ENVIRONMENT: prod
  APPROVAL_REQUIRED: true
  GITHUB_ENVIRONMENT: prod-approval

jobs:
  terraform-plan:
    name: Terraform Plan (prod)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: [batch-1, batch-2]

    steps:
      - name: Checkout
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.batch == 'all' || github.event.inputs.batch == matrix.batch
        uses: actions/checkout@v4

      - name: Setup Terraform
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.batch == 'all' || github.event.inputs.batch == matrix.batch
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.1

      - name: Configure AWS
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.batch == 'all' || github.event.inputs.batch == matrix.batch
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.batch == 'all' || github.event.inputs.batch == matrix.batch
        working-directory: terraform-infrastructure
        run: terraform init -backend-config="environments/${{ env.ENVIRONMENT }}/${{ matrix.batch }}/backend.hcl"

      - name: Terraform Plan
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.batch == 'all' || github.event.inputs.batch == matrix.batch
        working-directory: terraform-infrastructure
        run: |
          REFRESH_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.disable_refresh }}" = "true" ]; then
            REFRESH_FLAG="-refresh=false"
          fi
          terraform plan ${REFRESH_FLAG} -var-file="environments/${{ env.ENVIRONMENT }}/${{ matrix.batch }}/infra.tfvars" -out=tfplan-${{ matrix.batch }}

      - name: Upload Plan
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.batch == 'all' || github.event.inputs.batch == matrix.batch
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}-${{ matrix.batch }}
          path: terraform-infrastructure/tfplan-${{ matrix.batch }}

  terraform-apply:
    name: Terraform Apply (prod - Manual Approval Required)
    needs: terraform-plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: [batch-1, batch-2]
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    environment: prod-approval

    steps:
      - name: Checkout
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.batch == 'all' || github.event.inputs.batch == matrix.batch
        uses: actions/checkout@v4

      - name: Setup Terraform
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.batch == 'all' || github.event.inputs.batch == matrix.batch
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.1

      - name: Configure AWS
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.batch == 'all' || github.event.inputs.batch == matrix.batch
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.batch == 'all' || github.event.inputs.batch == matrix.batch
        working-directory: terraform-infrastructure
        run: terraform init -backend-config="environments/${{ env.ENVIRONMENT }}/${{ matrix.batch }}/backend.hcl"

      - name: Download Plan
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.batch == 'all' || github.event.inputs.batch == matrix.batch
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}-${{ matrix.batch }}
          path: terraform-infrastructure

      - name: Terraform Apply
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.batch == 'all' || github.event.inputs.batch == matrix.batch
        working-directory: terraform-infrastructure
        run: |
          REFRESH_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.disable_refresh }}" = "true" ]; then
            REFRESH_FLAG="-refresh=false"
          fi
          terraform apply ${REFRESH_FLAG} tfplan-${{ matrix.batch }}
